<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IELTSCORE | Kursga yozilish</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <section class="carousel-section" aria-label="Kurslar galereyasi">
        <div class="carousel-logo" aria-label="IELTSCORE logotip">IELTSCORE</div>
        <div class="swiper course-swiper" id="courseSwiper" aria-label="Kurslar carousel">
          <div class="swiper-wrapper" id="swiperWrapper"></div>
          <div class="swiper-pagination" aria-label="Slayd ko'rsatkichlari"></div>
          <div class="swiper-button-prev" aria-label="Oldingi kurs"></div>
          <div class="swiper-button-next" aria-label="Keyingi kurs"></div>
        </div>
      </section>

      <section class="form-section" aria-label="Ro'yxatdan o'tish formasi">
        <div class="form-card">
          <form class="form" id="registrationForm" novalidate>
            <header class="card-head">
              <div class="top-pill" aria-label="Kursga yozilish badge">🎓 Kursga yozilish</div>

              <div class="hero-title">
                <div class="hero-line hero-line--gradient">IELTSCORE</div>
                <!-- <div class="hero-line hero-line--white">Bepul darsga</div>
                <div class="hero-line hero-line--gradient">yoziling!</div> -->
              </div>

              <p class="hero-subtext">
                Ma'lumotlaringizni qoldiring — menejerlar siz bilan bog'lanishadi.
              </p>

              <div class="trust-row" aria-label="Ishonch belgilar">
                <div class="trust-item">✅ Bepul birinchi dars</div>
                <div class="trust-item">⚡ Tez o'sish</div>
                <div class="trust-item">🌍 Kompyuterda darslar</div>
              </div>
            </header>

            <div class="form-fields" id="formFields">
              <div class="field">
              <input
                id="nameInput"
                class="field-input"
                type="text"
                name="name"
                placeholder="Masalan: Alibek Yusupov"
                autocomplete="name"
              />
              <label class="field-label" for="nameInput">Ismingiz</label>
              <svg class="field-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M12 12a5 5 0 1 0-5-5a5 5 0 0 0 5 5m0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5"
                />
              </svg>
              <p class="error-message" id="nameError" aria-live="polite"></p>
            </div>

              <div class="field">
              <input
                id="phoneInput"
                class="field-input"
                type="tel"
                name="phone"
                placeholder="+998 90 123 45 67"
                inputmode="numeric"
                autocomplete="tel"
              />
              <label class="field-label" for="phoneInput"
                >Telefon raqamingiz</label
              >
              <svg class="field-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.01-.24a11.4 11.4 0 0 0 3.58.57a1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.49a1 1 0 0 1 1 1a11.4 11.4 0 0 0 .57 3.58a1 1 0 0 1-.24 1.01z"
                />
              </svg>
              <p class="error-message" id="phoneError" aria-live="polite"></p>
            </div>
            </div>

            <section class="success-state" id="successState" hidden aria-label="Muvaffaqiyat holati">
              <div class="success-icon" aria-hidden="true">✅</div>
              <div class="success-title">Tabriklaymiz!</div>
              <div class="success-subtitle">Tez orada siz bilan bog'lanamiz.</div>
              <div class="success-note">Odatda 30 daqiqa ichida</div>
            </section>

            <button class="submit-btn" id="submitBtn" type="submit">
              <span class="btn-label">Ariza yuborish →</span>
            </button>

            <p
              class="success-message"
              id="successMessage"
              aria-live="polite"
            ></p>

            <footer class="card-footer">
              <div class="callout">yoki to'g'ridan-to'g'ri qo'ng'iroq qiling</div>
              <a class="call-link" href="tel:+998507558850">+998 50 755 88 50</a>
            </footer>
          </form>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
